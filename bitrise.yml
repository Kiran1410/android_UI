---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android
workflows:
  build_apk:
    summary:
    description:
    steps:
    - git-clone@8: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: "$PROJECT_LOCATION/gradlew"
    - script:
        title: Build
        inputs:
        - content: |-
            #!/bin/bash
            # fail if any commands fails
            ./gradlew assembleRelease
    - script:
        title: UnitTest
        inputs:
        - content: |-
            #!/bin/bash
            # fail if any commands fails
            ./gradlew ReleaseUnitTest
    meta:
      bitrise.io:
        machine_type_id: standard
meta:
  bitrise.io:
    stack: linux-docker-android-22.04
    machine_type_id: standard
app:
  envs:
  - opts:
      is_expand: false
    PROJECT_LOCATION: "."
  - opts:
      is_expand: false
    MODULE: app